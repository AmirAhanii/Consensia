services:
  db:
    image: postgres:16
    container_name: consensia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: consensia
      POSTGRES_USER: consensia
      POSTGRES_PASSWORD: consensia_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consensia -d consensia"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Browser must match exactly; include 127.0.0.1 if you open the app that way.
      CORS_ALLOW_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      RESEARCH_RAW_AUTHORS_DIR: "/app/backend/data/raw_authors"
      DATABASE_URL: "postgresql+psycopg://consensia:consensia_password@db:5432/consensia"
    volumes:
      - ./backend/app:/app/backend/app
      - ./backend/data:/app/backend/data
      - ./backend/alembic:/app/backend/alembic
      - ./backend/alembic.ini:/app/backend/alembic.ini
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Force empty so the browser never calls localhost:8000 from inside Docker (that hits the container itself).
      # Same-origin `/api` → Vite proxy → backend service.
      VITE_API_BASE_URL: ""
      VITE_DEV_PROXY_TARGET: "http://backend:8000"
      VITE_OPEN: "false"
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/src/index.css:/app/frontend/src/index.css
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/frontend/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/frontend/tsconfig.node.json
      - ./frontend/tailwind.config.ts:/app/frontend/tailwind.config.ts
      - ./frontend/postcss.config.cjs:/app/frontend/postcss.config.cjs
    command: ./node_modules/.bin/vite --host 0.0.0.0 --port 5173
    depends_on:
      - backend

volumes:
  postgres_data: