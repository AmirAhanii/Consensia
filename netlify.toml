# Free public URL example: https://consensia.netlify.app (pick an available site name in Netlify UI)
# Connect this GitHub repo → Netlify → base directory "frontend", or rely on these settings.

# Publish path is from repo root (avoids UI/base-directory confusion that causes Netlify 404s).
[build]
  command = "cd frontend && npm ci && VITE_BASE_PATH=/ npm run build:pages"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: deep links like /register must serve index.html (static files in /assets still win first).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Also ships in frontend/public/_redirects — keep both so a bad Netlify UI “base dir” doesn’t drop SPA rules.
